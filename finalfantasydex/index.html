<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Fantasy</title>
    <link rel = "stylesheet" href = "style.css">

</head>
<body>
    <div id = "page">
        <header id ="headnav">
                <div class="logo-section">
                    <img src = "logo.png" id = "logo">
                    <img src = "PIXEL.png" id = "logofont">
                </div>
                <div class="search-section">
                <input type= "text" id = "searchbar" placeholder="Search">
                <img src  = "search.png" id = "searchlogo">
                </div>


        </header>
            <nav id ="secondnav">
                <a href="#">
                <img src = "home.png" alt = "Home">
                <span>Home</span>
                </a>
                
                <a href="#">
                <img src = "characters.png" alt = "Characters">
                <span>Characters</span>
                </a>           
                
                <a href="#">
                <img src = "videogames.png" alt = "Videogames">
                <span>Videogames</span>
                </a>            
                
                <a href="#">
                <img src = "gameplay.png" alt = "Gameplay">
                <span>Gameplay</span>
                </a>

            </nav>
        <div id = "selection">
            <h1 id="title"> Final Fantasy World</h1>

            <div class ="character">
                <img src= "zidane.png" alt ="Zidane">
                <h2>Zidane Tribal</h2>

                <div class = "tags">
                    <div class = "game">
                        <p>FF9</p>

                    </div>
                    <div class = "job">
                        <p>Thief</p>
                    
                    </div>
                </div>
            </div>

            <div class ="character">
                <img src= "cloud.png" alt ="Cloud">
                <h2>Cloud Strife</h2>

                <div class = "tags">
                    <div class = "game">
                        <p>FF7</p>

                    </div>
                    <div class = "job">
                        <p>Soldier</p>
                    
                    </div>
                </div>
            </div>

            <div class ="character">
                <img src= "yuna.png" alt ="Yuna">
                <h2>Yuna</h2>

                <div class = "tags">
                    <div class = "game">
                        <p>FFX</p>

                    </div>
                    <div class = "job">
                        <p>White Mage</p>
                    
                    </div>
                </div>
            </div>

            <div class ="character">
                <img src= "sephiroth.png" alt ="Sephiroth">
                <h2>Sephiroth</h2>

                <div class = "tags">
                    <div class = "game">
                        <p>Soldier</p>

                    </div>
                    <div class = "job">
                        <p>Sephiroth</p>
                    
                    </div>
                </div>
            </div>




        </div>
</div>

    
    <script src = "app.js"> </script>
</body>
</html>
